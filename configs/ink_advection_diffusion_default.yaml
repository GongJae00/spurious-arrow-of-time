seed: 0
benchmark_name: ink_advection_diffusion
experiment: ink_advection_diffusion_data_diagnostics
splits:
  train:
    n_sequences: 10000
    spurious_mode: correlated
  val_iid:
    n_sequences: 2000
    spurious_mode: correlated
  iid_test:
    n_sequences: 5000
    spurious_mode: correlated
  ood_test:
    n_sequences: 5000
    spurious_mode: reversed
data:
  grid_size: 32
  length: 16
  core_diffusion: 0.16
  spurious_diffusion: 0.12
  core_flow_x: 0.0
  core_flow_y: 0.0
  spurious_flow_scale: 0.8
  source_blur_sigma: 1.0
  pre_observation_steps: 8
  dt: 0.35
  dx: 1.0
  label_mode: core_source_x_median_threshold
  spurious_label_correlation_strength: 1.0
observation:
  core_scale: 1.0
  spur_scale: 0.9
  noise_std: 0.003
counterfactual:
  spurious_cf_mode: randomized
  reuse_noise: true
diagnostics:
  min_signal_to_noise: 1.0
  core_oracle_floor: 0.95
  spurious_iid_floor: 0.90
  max_source_mass_final_fraction: 0.85
  max_peak_contrast_final_fraction: 0.85
sid_schedule:
  task_warmup_epochs: 5
  dynamics_warmup_epochs: 5
  regularizer_ramp_epochs: 10
loss_weights:
  lambda_cf_task: 1.0
  lambda_rev_cf: 0.25
  lambda_task_ir_cf: 0.25
  lambda_spur_sens: 0.25
  lambda_spur_adv: 0.1
  lambda_core_preserve: 1.0
  lambda_spur_capture: 0.2
  lambda_arrow_decomp: 0.1
  lambda_anti_collapse: 0.05
  lambda_task_forward: 1.0
  lambda_task_reverse: 1.0
  lambda_spur_forward: 1.0
  lambda_spur_reverse: 1.0
