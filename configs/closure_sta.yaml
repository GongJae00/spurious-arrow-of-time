base_config: configs/sta_full.yaml
experiment: closure_spurious_causality
benchmark_name: sta_bench

# Closure is intentionally narrow. It tests whether OOD failure follows from a
# dynamic spurious-arrow shift, not from generic shortcut artifacts.
methods:
  - erm
  - sib
  - sid
  - itm

closure_conditions:
  correlated_reversed_ood:
    closure_role: main_spurious_arrow_trap
    splits:
      train:
        spurious_mode: correlated
      val_iid:
        spurious_mode: correlated
      iid_test:
        spurious_mode: correlated
      ood_test:
        spurious_mode: reversed

  correlated_no_shift:
    closure_role: no_distribution_shift_control
    splits:
      train:
        spurious_mode: correlated
      val_iid:
        spurious_mode: correlated
      iid_test:
        spurious_mode: correlated
      ood_test:
        spurious_mode: correlated

  randomized_no_shortcut:
    closure_role: no_spurious_arrow_control
    splits:
      train:
        spurious_mode: randomized
      val_iid:
        spurious_mode: randomized
      iid_test:
        spurious_mode: randomized
      ood_test:
        spurious_mode: randomized
