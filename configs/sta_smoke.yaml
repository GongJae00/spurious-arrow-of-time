base_config: configs/sta_default.yaml
experiment: sta_smoke
methods:
  - erm
  - ib
  - ep_min
  - ep_max
  - ocp_style
  - lens_like_arrow_classifier
  - sib
  - sid
  - itm
splits:
  train:
    n_sequences: 96
    spurious_mode: correlated
  val_iid:
    n_sequences: 48
    spurious_mode: correlated
  iid_test:
    n_sequences: 48
    spurious_mode: correlated
  ood_test:
    n_sequences: 48
    spurious_mode: reversed
data:
  length: 8
  obs_dim: 8
model:
  encoder: gru
  hidden_dim: 16
  latent_dim: 4
  pooling: last
  num_layers: 1
  dropout: 0.0
  bidirectional: false
sid:
  z_rev_dim: 4
  z_ir_task_dim: 4
  z_ir_spur_dim: 4
  z_resid_dim: 0
  spur_sensitivity_margin: 0.02
itm:
  core_dim: 4
  spur_dim: 4
  spur_sensitivity_margin: 0.02
  grl_alpha: 1.0
itm_schedule:
  task_warmup_epochs: 0
  transition_warmup_epochs: 0
  regularizer_ramp_epochs: 1
dynamics:
  hidden_dim: 16
  min_logvar: -6.0
  max_logvar: 2.0
  fixed_variance: true
  train_on_counterfactual: false
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  batch_size: 24
  grad_clip_norm: 1.0
  epochs: 1
  patience: 2
setpoint:
  mode: fixed_grid
  fixed_target: 0.0
loss_weights:
  lambda_f: 1.0
  lambda_r: 1.0
  eta_total: 1.0
  eta_step: 0.1
  rho: 1.0
  lambda_cf_task: 1.0
  beta_latent: 0.0
  lambda_rev_cf: 0.25
  lambda_task_ir_cf: 0.25
  lambda_spur_sens: 0.25
  lambda_arrow_decomp: 0.1
  lambda_anti_collapse: 0.05
  lambda_task_forward: 1.0
  lambda_task_reverse: 1.0
  lambda_spur_forward: 1.0
  lambda_spur_reverse: 1.0
  lambda_core_transition: 1.0
  lambda_spur_transition: 0.5
  lambda_core_mech_cf: 1.0
  lambda_spur_mech_sens: 0.5
  ep_regularizer:
    ep_min: abs_mean
    ep_max: abs_mean
