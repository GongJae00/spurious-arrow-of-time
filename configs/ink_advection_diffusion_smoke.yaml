base_config: configs/ink_advection_diffusion_full.yaml
experiment: ink_advection_diffusion_smoke
splits:
  train:
    n_sequences: 128
    spurious_mode: correlated
  val_iid:
    n_sequences: 64
    spurious_mode: correlated
  iid_test:
    n_sequences: 64
    spurious_mode: correlated
  ood_test:
    n_sequences: 64
    spurious_mode: reversed
data:
  grid_size: 24
  length: 12
model:
  hidden_dim: 16
  latent_dim: 4
sid:
  z_rev_dim: 4
  z_ir_task_dim: 4
  z_ir_spur_dim: 4
itm:
  core_dim: 4
  spur_dim: 4
itm_schedule:
  task_warmup_epochs: 0
  transition_warmup_epochs: 0
  regularizer_ramp_epochs: 1
dynamics:
  hidden_dim: 16
training:
  batch_size: 32
  epochs: 2
  patience: 2
  min_epoch_for_checkpoint_selection: 0
  min_epochs_before_early_stopping: 0
sid_loss_normalization:
  normalize_dynamics_nll_by: none
  normalize_role_mse_by_batch_std: true
  log_gradient_norms: true
