seed: 0
splits:
  train:
    n_sequences: 10000
    spurious_mode: correlated
  val_iid:
    n_sequences: 2000
    spurious_mode: correlated
  iid_test:
    n_sequences: 5000
    spurious_mode: correlated
  ood_test:
    n_sequences: 5000
    spurious_mode: reversed
data:
  length: 32
  n_core_states: 8
  n_spur_states: 8
  p_core: 0.35
  q_core: 0.25
  p_spur: 0.45
  q_spur: 0.15
  obs_dim: 16
  label_mode: core_net_displacement_median_threshold
  spurious_correlation_type: drift_direction
  spurious_label_correlation_strength: 1.0
  trajectory_arrow_statistic: net_clockwise_displacement
  initial_state_mode:
    core: uniform_stationary
    spurious: uniform_stationary
observation:
  core_scale: 1.0
  spur_scale: 1.0
  normalize_mixing_columns: true
  noise_std: 0.1
counterfactual:
  spurious_cf_mode: randomized
  reuse_noise: true
model:
  encoder: gru
  hidden_dim: 64
  latent_dim: 16
  num_layers: 1
  dropout: 0.0
  bidirectional: false
  pooling: last
dynamics:
  hidden_dim: 64
  min_logvar: -6.0
  max_logvar: 2.0
  fixed_variance: false
  train_on_counterfactual: false
  sigma_per_step_abs_threshold: 10000.0
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  batch_size: 128
  num_workers: 0
  persistent_workers: false
  deterministic: false
  grad_clip_norm: 1.0
  epochs: 50
  early_stopping_metric: val_iid_accuracy
  patience: 10
sid_schedule:
  task_warmup_epochs: 5
  dynamics_warmup_epochs: 5
  regularizer_ramp_epochs: 10
loss_weights:
  lambda_f: 1.0
  lambda_r: 1.0
  eta_total: 1.0
  eta_step: 0.1
  rho: 1.0
  lambda_cf_task: 1.0
  beta_latent: 0.0
  lambda_rev_cf: 0.25
  lambda_task_ir_cf: 0.25
  lambda_spur_sens: 0.25
  lambda_spur_adv: 0.1
  lambda_core_preserve: 1.0
  lambda_spur_capture: 0.2
  lambda_arrow_decomp: 0.1
  lambda_anti_collapse: 0.05
  lambda_task_forward: 1.0
  lambda_task_reverse: 1.0
  lambda_spur_forward: 1.0
  lambda_spur_reverse: 1.0
  ep_regularizer:
    ep_min: abs_mean
    ep_max: abs_mean
setpoint:
  mode: fixed_grid
  fixed_target: 0.0
